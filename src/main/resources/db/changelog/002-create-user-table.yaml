databaseChangeLog:
  - changeSet:
      id: 2
      author: eduard
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR
                  constraints:
                    nullable: false
              - column:
                  name: grade
                  type: VARCHAR
                  constraints:
                    nullable: false